<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - MindVault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .offline-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .offline-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        .offline-container h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #00f2ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .offline-container p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .offline-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .offline-btn {
            padding: 1rem 2rem;
            background: rgba(0, 242, 255, 0.12);
            border: 2px solid var(--clr-cyan);
            color: var(--clr-cyan);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .offline-btn:hover {
            background: var(--clr-cyan);
            color: var(--bg-deep);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }

        .sync-status {
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            border-left: 4px solid var(--clr-cyan);
        }

        .sync-status.synced {
            border-left-color: var(--clr-gold);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Offline Mode</h1>
        <p>MindVault is running in offline mode. Your entries are being stored locally and will sync when your connection is restored.</p>
        
        <div class="offline-actions">
            <button class="offline-btn" onclick="location.reload()">Retry Connection</button>
            <button class="offline-btn" onclick="window.history.back()">Go Back</button>
        </div>

        <div class="sync-status" id="syncStatus">
            <p style="margin: 0; color: var(--clr-cyan); font-weight: 600;">Waiting for connection...</p>
        </div>
    </div>

    <script>
        // Check connection status
        function checkConnection() {
            if (navigator.onLine) {
                document.getElementById('syncStatus').classList.add('synced');
                document.getElementById('syncStatus').innerHTML = '<p style="margin: 0; color: var(--clr-gold); font-weight: 600;">✓ Connection restored! Syncing your entries...</p>';
                setTimeout(() => {
                    location.reload();
                }, 1500);
            }
        }

        window.addEventListener('online', checkConnection);
        setInterval(checkConnection, 3000);

        // Service Worker messaging
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.ready.then((registration) => {
                const channel = new MessageChannel();
                channel.port1.onmessage = (event) => {
                    if (event.data.type === 'SYNC_COMPLETE') {
                        checkConnection();
                    }
                };
                registration.active.postMessage({ type: 'PORT_INITIALIZATION' }, [channel.port2]);
            });
        }
    </script>
</body>
</html>

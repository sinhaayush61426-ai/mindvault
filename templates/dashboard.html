{% extends "base.html" %}

{% block title %}Dashboard - MindVault{% endblock %}

{% block content %}
<div class="vault-layout">
    <aside class="pane pane-left">
        <div class="glass-panel" style="padding: 2rem; margin: 1.5rem;">
            <h4 class="text-highlight" style="margin-bottom: 1.5rem; letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem;">Vault Archive</h4>
            {% for entry in entries %}
            <article class="card" style="margin-bottom: 1rem;">
                <small class="text-muted">{{ entry.category | default('General') }}</small>
                <div style="margin-top: 0.6rem; font-weight: 700;">{{ entry.title }}</div>
            </article>
            {% endfor %}
        </div>
    </aside>

    <main class="pane pane-center">
        <div class="glass-panel form-card">
            <form action="/save-entry" method="POST">
                <div class="form-field">
                    <input type="text" name="title" placeholder="Project Title..." style="background: transparent; border: none; color: #fff; font-size: 2.5rem; font-weight: 900; width: 100%; outline: none;" required>
                </div>

                <div class="form-field">
                    <select name="category">
                        <option value="General">General</option>
                        <option value="Novella">Novella/Fiction</option>
                        <option value="Research">Science Research</option>
                    </select>
                </div>

                <div class="form-field">
                    <textarea name="content" placeholder="Start writing..."></textarea>
                </div>

                <div class="submit-block">
                    <button type="submit" class="btn btn-primary">Seal Entry</button>
                </div>
            </form>
        </div>
    </main>

    <aside class="pane pane-right">
        <div class="glass-panel" style="padding: 2rem; margin: 1.5rem;">
            <h5 class="text-highlight" style="margin-bottom: 1rem; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem;">Clarity Metrics</h5>
            <canvas id="clarityChart" width="100%" height="150"></canvas>
        </div>
    </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('clarityChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['M', 'T', 'W', 'T', 'F'],
            datasets: [{
                data: [60, 80, 45, 90, 70],
                borderColor: '#00f2ff',
                tension: 0.4,
                pointRadius: 0,
                borderWidth: 2
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { x: { display: false }, y: { display: false } },
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>
{% endblock %}

{% extends "base.html" %}

{% block title %}{{ entry.title }} - MindVault{% endblock %}

{% block content %}
<div class="entry-view-minimal">
    <!-- Header with Controls -->
    <div class="entry-header-minimal">
        <div class="entry-header-left">
            <h1 class="entry-title-minimal">{{ entry.title }}</h1>
            <div class="entry-meta">
                <span class="meta-item">{{ entry.category }}</span>
                <span class="meta-separator">•</span>
                <span class="meta-item">{{ entry.timestamp.strftime('%b %d, %Y') }}</span>
            </div>
        </div>
        <div class="entry-header-right">
            <a href="{{ url_for('view_snapshots', entry_id=entry.id) }}" class="btn-icon-minimal" title="View versions">
                <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                    <circle cx="12" cy="13" r="4"></circle>
                </svg>
            </a>
            <button id="zen-toggle" class="btn-icon-minimal" title="Focus mode">
                <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                    <line x1="9" y1="9" x2="9.01" y2="9"></line>
                    <line x1="15" y1="9" x2="15.01" y2="9"></line>
                </svg>
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn-icon-minimal" title="Back to dashboard">
                <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"></path>
                </svg>
            </a>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="entry-content-minimal">
        <div class="glass-panel content-panel">
            <div class="entry-text">
                {{ content }}
            </div>
        </div>
    </div>

    <!-- Snapshot Creation Section (Minimal) -->
    <div class="snapshot-section-minimal">
        <form method="POST" action="{{ url_for('create_snapshot', entry_id=entry.id) }}" class="snapshot-form-minimal">
            <div class="form-row">
                <input 
                    type="text" 
                    name="version" 
                    placeholder="Version" 
                    value="1.0" 
                    class="input-minimal"
                    pattern="^\d+\.\d+$"
                    required
                >
                <input 
                    type="text" 
                    name="description" 
                    placeholder="Description (optional)" 
                    class="input-minimal"
                >
                <button type="submit" class="btn-minimal btn-primary">Save Version</button>
            </div>
        </form>
    </div>

    <!-- Zen Counter (Hidden by default, shown in zen-mode) -->
    <div class="zen-counter" id="zen-counter" style="display: none;">
        <div id="zen-word-count">Words: 0</div>
        <div id="zen-char-count">Characters: 0</div>
    </div>
</div>

<script>
    // Word count and zen mode for entry view
    function initializeEntryMetrics() {
        const entryText = document.querySelector('.entry-text');
        if (!entryText) return;
        
        const text = entryText.textContent.trim();
        const wordCount = text === '' ? 0 : text.split(/\s+/).length;
        const charCount = text.length;
        
        console.log(`Entry: ${wordCount} words, ${charCount} characters`);
        
        // Store metrics for zen mode display
        window.entryMetrics = { wordCount, charCount };
    }

    // Initialize zen mode toggle
    function initializeZenMode() {
        const zenToggle = document.getElementById('zen-toggle');
        const zenCounter = document.getElementById('zen-counter');
        const entryText = document.querySelector('.entry-text');
        
        if (!zenToggle) return;
        
        zenToggle.addEventListener('click', () => {
            document.body.classList.toggle('zen-mode');
            
            // Show/hide zen counter based on zen mode state
            if (zenCounter) {
                if (document.body.classList.contains('zen-mode')) {
                    // Update counter with actual metrics
                    if (window.entryMetrics) {
                        document.getElementById('zen-word-count').textContent = 
                            `Words: ${window.entryMetrics.wordCount}`;
                        document.getElementById('zen-char-count').textContent = 
                            `Characters: ${window.entryMetrics.charCount}`;
                    }
                    zenCounter.style.display = 'block';
                } else {
                    zenCounter.style.display = 'none';
                }
            }
        });
        
        // Save zen mode preference
        if (localStorage.getItem('zenMode') === 'true') {
            document.body.classList.add('zen-mode');
            if (zenCounter) zenCounter.style.display = 'block';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        initializeEntryMetrics();
        initializeZenMode();
    });
</script>
{% endblock %}
